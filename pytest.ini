[pytest]
testpaths = tests
python_files = test_*.py
# Legacy manual scripts (require a live server + weights, run top-level network calls on
# import). They are kept for manual use but excluded from automated collection.
addopts = --ignore=tests/test_api.py --ignore=tests/test_batch_api.py --ignore=tests/test_confidence_metrics.py
norecursedirs = .venv data uploads models notebooks docs frontend alembic
markers =
    integration: tests that require a live PostgreSQL database (host port 5433 by default).
filterwarnings =
    ignore::DeprecationWarning
