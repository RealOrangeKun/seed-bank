name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: seedbank
          POSTGRES_PASSWORD: seedbank_dev_password
          POSTGRES_DB: seedbank_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seedbank -d seedbank_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://seedbank:seedbank_dev_password@localhost:5432/seedbank_db
      TEST_DATABASE_URL: postgresql+psycopg://seedbank:seedbank_dev_password@localhost:5432/seedbank_db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU torch + project deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch/torchvision (no CUDA needed for tests).
          pip install torch==2.9.1 torchvision==0.24.1 --index-url https://download.pytorch.org/whl/cpu
          # Everything else except the CUDA wheels (already have CPU torch).
          grep -viE '^(nvidia-|torch==|torchvision==|triton==)' requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
