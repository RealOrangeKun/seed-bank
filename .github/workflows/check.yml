# Fast PR gate — mirrors `make check` (lint + typecheck + unit).
# No coverage enforcement here: the unit subset alone won't hit the
# project's 80% gate (that's enforced by the full pyramid in test.yml).
name: check

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev toolchain (from the lockfile — reproducible)
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --extra dev

      - name: uv.lock is in sync with pyproject.toml
        run: uv lock --check

      - name: ruff format (check only)
        run: .venv/bin/ruff format --check .

      - name: ruff lint
        run: .venv/bin/ruff check .

      - name: mypy (strict)
        run: .venv/bin/mypy

      - name: unit tests
        run: .venv/bin/pytest -m "unit or not integration and not e2e" tests/unit --no-cov
