# Ruff configuration. Focused on correctness/maintainability rules; pure-formatting
# noise (line length, trailing whitespace) is left to the formatter and not enforced in CI.
line-length = 120
target-version = "py312"
# Research/demo artifacts are not part of the app surface.
extend-exclude = ["notebooks", "prototype_images", ".venv"]

[lint]
# F = pyflakes (real bugs: unused, redefinitions, f-strings, dup keys)
# E4/E7/E9 = import placement, statement issues, syntax; W6 = deprecations
select = ["F", "E4", "E7", "E9", "W6"]
ignore = [
    "E501",  # line too long (cosmetic)
    "E402",  # allow a few intentional late imports if needed
]

[lint.per-file-ignores]
# Legacy manual scripts and notebooks are not held to the same bar.
"tests/test_api.py" = ["F"]
"tests/test_batch_api.py" = ["F"]
"tests/test_confidence_metrics.py" = ["F"]
"alembic/**" = ["F", "E"]
